name: Draft baseline (to staging)

# Generates a baseline article via Sonnet and uploads the body as a workflow
# artifact. The Mac codex_rewrite.py job polls GH Actions for new successful
# runs of this workflow (no Discord round-trip), downloads the artifact, runs
# Codex fact-check + surgical rewrite, then triggers publish-corrected.yml.

on:
  workflow_dispatch:
    inputs:
      team:
        description: 'Team slug (e.g. commanders, capitals, nationals)'
        required: true
        type: string
      date:
        description: 'Article date YYYY-MM-DD (default: today UTC)'
        required: false
        type: string
        default: ''

jobs:
  draft:
    runs-on: ubuntu-latest
    env:
      INPUT_TEAM: ${{ inputs.team }}
      INPUT_DATE: ${{ inputs.date }}
      GH_RUN_ID:  ${{ github.run_id }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests

      - name: Resolve target date
        run: |
          if [ -z "$INPUT_DATE" ]; then
            RESOLVED_DATE=$(date -u +%Y-%m-%d)
          else
            RESOLVED_DATE="$INPUT_DATE"
          fi
          echo "RESOLVED_DATE=$RESOLVED_DATE" >> "$GITHUB_ENV"
          echo "ARTIFACT_NAME=nsmt-draft-${INPUT_TEAM}-${GH_RUN_ID}" >> "$GITHUB_ENV"

      - name: Generate baseline article (no admin save, no live Discord)
        run: |
          python generate_baselines.py \
            --team "$INPUT_TEAM" \
            --date "$RESOLVED_DATE" \
            --no-admin --no-discord

      - name: Locate draft file + extract title
        run: |
          DRAFT_PATH=$(ls drafts/*baseline.md 2>/dev/null | head -1)
          if [ -z "$DRAFT_PATH" ]; then
            echo "No baseline draft was produced. Check Anthropic key / team slug." >&2
            exit 1
          fi
          DRAFT_TITLE=$(head -1 "$DRAFT_PATH" | sed 's/^# //')
          echo "DRAFT_PATH=$DRAFT_PATH"   >> "$GITHUB_ENV"
          echo "DRAFT_TITLE=$DRAFT_TITLE" >> "$GITHUB_ENV"

      - name: Write metadata sidecar for the Mac poller
        run: |
          python <<'PY'
          import json, os, pathlib
          pathlib.Path("drafts/_meta").mkdir(parents=True, exist_ok=True)
          meta = {
              "team_slug":    os.environ["INPUT_TEAM"],
              "article_type": "baseline",
              "article_date": os.environ["RESOLVED_DATE"],
              "run_id":       os.environ["GH_RUN_ID"],
              "title":        os.environ["DRAFT_TITLE"],
          }
          pathlib.Path("drafts/_meta/meta.json").write_text(json.dumps(meta, indent=2))
          print(json.dumps(meta, indent=2))
          PY

      - name: Upload draft + metadata as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: |
            ${{ env.DRAFT_PATH }}
            drafts/_meta/meta.json
          retention-days: 7
