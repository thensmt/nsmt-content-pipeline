name: Citron Player Feature Demo

on:
  workflow_dispatch:
    inputs:
      no_fact_check:
        description: 'Skip the in-line Sonnet fact-check pass'
        required: false
        default: 'false'
      from_draft:
        description: 'Path to an existing drafts/*.md file to re-fact-check instead of generating a new article (e.g. drafts/citron-feature-2026-05-22.md)'
        required: false
        default: ''

jobs:
  citron-feature:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Citron feature demo
        env:
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          DISCORD_PROXY_URL:    ${{ secrets.DISCORD_PROXY_URL }}
          DISCORD_PROXY_SECRET: ${{ secrets.DISCORD_PROXY_SECRET }}
          INPUT_NO_FACT_CHECK:  ${{ github.event.inputs.no_fact_check }}
          INPUT_FROM_DRAFT:     ${{ github.event.inputs.from_draft }}
        run: |
          ARGS=()
          if [ "$INPUT_NO_FACT_CHECK" = "true" ]; then
            ARGS+=(--no-fact-check)
          fi
          if [ -n "$INPUT_FROM_DRAFT" ]; then
            ARGS+=(--from-draft "$INPUT_FROM_DRAFT")
          fi
          python scripts/demo_citron_feature.py "${ARGS[@]}"

      - name: Upload draft
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: citron-feature-${{ github.run_id }}
          path: drafts/
          if-no-files-found: warn
