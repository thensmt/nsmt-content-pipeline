name: Transcript CI Probe (datacenter IP feasibility)

# DIAGNOSTIC ONLY — Stage 2 feasibility gate.
# Tests whether YouTube blocks youtube-transcript-api fetches from a GitHub
# Actions (datacenter) egress IP. References ZERO repo secrets. Does not touch
# the real pipeline, admin API, Discord, or Anthropic. Throwaway scratch branch.
#
# Trigger: a branch-only workflow_dispatch is NOT dispatchable (GitHub requires
# workflow_dispatch workflows to live on the default branch). To keep this fully
# isolated from main, we trigger via push to the probe branch instead, and use
# `gh run rerun` to sample additional runner egress IPs. workflow_dispatch is
# left in place but is inert until/unless this file reaches the default branch.

on:
  workflow_dispatch:
  push:
    branches:
      - probe/transcript-ci

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install youtube-transcript-api
        run: |
          pip install youtube-transcript-api
          echo "installed version:"
          pip show youtube-transcript-api | grep -i '^Version'

      - name: Probe transcripts 3x (print egress IP before each attempt)
        run: |
          set +e   # do not fail-fast; run all 3 attempts then summarize
          pass=0
          fail=0
          for attempt in 1 2 3; do
            echo "===================================================="
            echo "ATTEMPT $attempt of 3"
            ip=$(curl -s https://api.ipify.org)
            echo "runner public IP: $ip"
            echo "----------------------------------------------------"
            python test_transcripts.py
            rc=$?
            echo "----------------------------------------------------"
            echo "attempt $attempt exit code: $rc"
            if [ "$rc" -eq 0 ]; then
              pass=$((pass + 1))
            else
              fail=$((fail + 1))
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "sleeping 20s before next attempt..."
              sleep 20
            fi
          done
          echo "===================================================="
          echo "RUN SUMMARY: ${pass}/3 attempts fully passed, ${fail}/3 attempts had >=1 failure"
