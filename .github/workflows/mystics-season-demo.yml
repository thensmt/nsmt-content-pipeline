name: Mystics Season Demo

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Discord channel target on the CF Worker'
        required: false
        default: 'RECAPS'
      no_discord:
        description: 'Skip Discord push (drafts uploaded as artifact only)'
        required: false
        default: 'false'

jobs:
  season-demo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run season demo
        env:
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          DISCORD_PROXY_URL:    ${{ secrets.DISCORD_PROXY_URL }}
          DISCORD_PROXY_SECRET: ${{ secrets.DISCORD_PROXY_SECRET }}
          INPUT_TARGET:         ${{ github.event.inputs.target }}
          INPUT_NO_DISCORD:     ${{ github.event.inputs.no_discord }}
        run: |
          if [ "$INPUT_NO_DISCORD" = "true" ]; then
            python scripts/demo_mystics_season.py --no-discord --target "$INPUT_TARGET"
          else
            python scripts/demo_mystics_season.py --target "$INPUT_TARGET"
          fi

      - name: Upload draft articles
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mystics-season-drafts-${{ github.run_id }}
          path: drafts/
          if-no-files-found: warn
