name: NSMT Daily Content Generation

on:
  schedule:
    # 10:00 UTC = 6 AM EDT (Mar-Nov) / 5 AM EST (Nov-Mar). GH Actions
    # free-tier scheduled workflows are typically delayed 1-3 hours past
    # the cron, so actual run lands 7-9 AM ET year-round.
    - cron: '0 10 * * *'
  workflow_dispatch:
    inputs:
      target_date:
        description: 'Date YYYY-MM-DD (default: yesterday)'
        required: false
        default: ''
      team_slug:
        description: 'Single team slug (e.g. nationals). Default: all in-season teams.'
        required: false
        default: ''
      enable_fact_check:
        description: 'Run the in-line Sonnet fact-check (true/false). Default off — Codex review provides verdict for free.'
        required: false
        default: 'false'

jobs:
  generate-articles:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Generate story packet for scoped team
        env:
          INPUT_TEAM_SLUG:   ${{ github.event.inputs.team_slug }}
          INPUT_TARGET_DATE: ${{ github.event.inputs.target_date }}
        run: |
          if [ -z "$INPUT_TEAM_SLUG" ]; then
            echo "No team_slug input — skipping per-team packet generation."
            exit 0
          fi
          PACKET_DATE="$INPUT_TARGET_DATE"
          if [ -z "$PACKET_DATE" ]; then
            PACKET_DATE=$(date -u -d "yesterday" +%Y-%m-%d 2>/dev/null || date -u -v-1d +%Y-%m-%d)
          fi
          echo "Generating packet for team=$INPUT_TEAM_SLUG date=$PACKET_DATE"
          if python -m ingestion.generate_story_packet --team "$INPUT_TEAM_SLUG" --date "$PACKET_DATE"; then
            echo "PACKET_STATUS=ok" >> "$GITHUB_ENV"
          else
            # Don't fail the workflow — the writer can still produce an article
            # using web_search and the team KB. But the v2 PASS gate (Codex
            # fact-check) is now load-bearing here: a hallucinated article
            # without packet grounding will likely fail v2 and get blocked.
            # Tag the run so the reviewer knows packet was missing.
            echo ""
            echo "::warning title=Packet generation failed::Story packet failed for $INPUT_TEAM_SLUG on $PACKET_DATE. Writer will fall back to web_search; rely on Codex v2 gate to catch hallucinations."
            echo "PACKET_STATUS=missing" >> "$GITHUB_ENV"
          fi

      - name: Run content pipeline
        env:
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          NSMT_USERNAME:        ${{ secrets.NSMT_USERNAME }}
          NSMT_PASSWORD:        ${{ secrets.NSMT_PASSWORD }}
          DISCORD_PROXY_URL:    ${{ secrets.DISCORD_PROXY_URL }}
          DISCORD_PROXY_SECRET: ${{ secrets.DISCORD_PROXY_SECRET }}
          INPUT_TARGET_DATE:    ${{ github.event.inputs.target_date }}
          INPUT_TEAM_SLUG:      ${{ github.event.inputs.team_slug }}
          INPUT_FACT_CHECK:     ${{ github.event.inputs.enable_fact_check }}
        run: |
          if [ "$INPUT_FACT_CHECK" = "true" ]; then
            export NSMT_FACT_CHECK=true
            echo "In-line Sonnet fact-check ENABLED for this run."
          else
            echo "In-line Sonnet fact-check disabled (default). Codex review will provide verdict."
          fi
          ARGS=()
          if [ -n "$INPUT_TARGET_DATE" ]; then
            ARGS+=("$INPUT_TARGET_DATE")
          fi
          if [ -n "$INPUT_TEAM_SLUG" ]; then
            ARGS+=(--team "$INPUT_TEAM_SLUG")
          fi
          python generate_content.py "${ARGS[@]}"

      - name: Upload draft articles (if any local fallbacks)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: article-drafts-${{ github.run_id }}
          path: drafts/
          if-no-files-found: ignore
