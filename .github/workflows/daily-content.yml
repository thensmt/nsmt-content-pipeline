name: NSMT Daily Content Generation

on:
  schedule:
    - cron: '0 13 * * *'  # 8am ET every day (13:00 UTC)
  workflow_dispatch:        # allows manual trigger from GitHub Actions tab

jobs:
  generate-articles:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run content pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NSMT_USERNAME: ${{ secrets.NSMT_USERNAME }}
          NSMT_PASSWORD: ${{ secrets.NSMT_PASSWORD }}
        run: python generate_content.py

      - name: Upload draft articles (if any local fallbacks)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: article-drafts-${{ github.run_id }}
          path: drafts/
          if-no-files-found: ignore
