name: NSMT Daily Content Generation

on:
  schedule:
    # Target: articles ready in Discord by 8 AM Eastern.
    # GH Actions free-tier scheduled workflows are typically delayed 1-3 hours
    # past the cron time, so we schedule ~3 hours early to land near 8 AM ET.
    # 10:00 UTC = 6 AM EDT (Mar-Nov) / 5 AM EST (Nov-Mar)
    # With typical 1-3 hr delay → actual run lands 7-9 AM ET year-round.
    - cron: '0 10 * * *'
  workflow_dispatch:        # allows manual trigger from GitHub Actions tab

jobs:
  generate-articles:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run content pipeline
        env:
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          NSMT_USERNAME:        ${{ secrets.NSMT_USERNAME }}
          NSMT_PASSWORD:        ${{ secrets.NSMT_PASSWORD }}
          DISCORD_PROXY_URL:    ${{ secrets.DISCORD_PROXY_URL }}
          DISCORD_PROXY_SECRET: ${{ secrets.DISCORD_PROXY_SECRET }}
        run: python generate_content.py

      - name: Upload draft articles (if any local fallbacks)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: article-drafts-${{ github.run_id }}
          path: drafts/
          if-no-files-found: ignore
