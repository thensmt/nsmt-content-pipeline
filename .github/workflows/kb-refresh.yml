name: KB Refresh (ESPN)

# Runs scripts/refresh_kb.py to pull live roster + record + schedule from
# ESPN and merge into data/teams/*.json. Commits + pushes any changes so
# the next daily-content cron (which runs ~3 hours later at 10 UTC) sees
# fresh data.

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      include_offseason:
        description: 'Also refresh teams whose league is out of season today'
        required: false
        default: 'false'
      include_eliminated:
        description: 'Also refresh teams marked as eliminated'
        required: false
        default: 'false'
      team:
        description: 'Single team slug (default: all eligible teams)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run KB refresh
        env:
          INPUT_INCLUDE_OFFSEASON: ${{ github.event.inputs.include_offseason }}
          INPUT_INCLUDE_ELIMINATED: ${{ github.event.inputs.include_eliminated }}
          INPUT_TEAM: ${{ github.event.inputs.team }}
        run: |
          ARGS=()
          if [ "$INPUT_INCLUDE_OFFSEASON" = "true" ]; then
            ARGS+=(--include-offseason)
          fi
          if [ "$INPUT_INCLUDE_ELIMINATED" = "true" ]; then
            ARGS+=(--include-eliminated)
          fi
          if [ -n "$INPUT_TEAM" ]; then
            ARGS+=(--team "$INPUT_TEAM")
          fi
          python scripts/refresh_kb.py "${ARGS[@]}"

      - name: Commit + push if KBs changed
        run: |
          if git diff --quiet data/teams/; then
            echo "No KB changes to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/teams/
          CHANGED_COUNT=$(git diff --cached --name-only | wc -l | tr -d ' ')
          git commit -m "KB auto-refresh: ${CHANGED_COUNT} team file(s) updated from ESPN"
          git push
